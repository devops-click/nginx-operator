---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.4
  name: nginxroutes.nginx.devops.click
spec:
  group: nginx.devops.click
  names:
    kind: NginxRoute
    listKind: NginxRouteList
    plural: nginxroutes
    shortNames:
    - nr
    - nxr
    singular: nginxroute
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.serverRef
      name: Server
      type: string
    - jsonPath: .spec.serverName
      name: Host
      type: string
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          NginxRoute is the Schema for the nginxroutes API.
          It represents a virtual host / server block configuration that is applied
          to a referenced NginxServer instance.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              NginxRouteSpec defines the desired state of an NGINX virtual host (server block).
              Each NginxRoute maps to one or more NGINX server {} blocks and must reference
              an NginxServer instance that will serve this route configuration.
            properties:
              accessControl:
                description: AccessControl defines IP-based access control for this
                  virtual host.
                properties:
                  allow:
                    description: Allow is a list of CIDR blocks to allow access.
                    items:
                      type: string
                    type: array
                  deny:
                    description: Deny is a list of CIDR blocks to deny access.
                    items:
                      type: string
                    type: array
                type: object
              cors:
                description: CORS defines Cross-Origin Resource Sharing settings.
                properties:
                  allowCredentials:
                    default: false
                    description: AllowCredentials indicates whether credentials are
                      supported.
                    type: boolean
                  allowHeaders:
                    default:
                    - Content-Type
                    - Authorization
                    description: AllowHeaders defines allowed request headers.
                    items:
                      type: string
                    type: array
                  allowMethods:
                    default:
                    - GET
                    - POST
                    - PUT
                    - DELETE
                    - OPTIONS
                    description: AllowMethods defines allowed HTTP methods.
                    items:
                      type: string
                    type: array
                  allowOrigins:
                    description: AllowOrigins defines allowed origins. Use "*" for
                      any origin.
                    items:
                      type: string
                    type: array
                  enabled:
                    description: Enabled enables CORS handling.
                    type: boolean
                  exposeHeaders:
                    description: ExposeHeaders defines response headers exposed to
                      the browser.
                    items:
                      type: string
                    type: array
                  maxAge:
                    default: 86400
                    description: MaxAge defines how long preflight results can be
                      cached (in seconds).
                    format: int32
                    type: integer
                required:
                - enabled
                type: object
              customServerSnippet:
                description: |-
                  CustomServerSnippet allows injecting raw NGINX directives into the server block.
                  Use with caution — no validation is performed on custom snippets.
                type: string
              headers:
                description: Headers defines custom HTTP headers to add or remove.
                properties:
                  add:
                    additionalProperties:
                      type: string
                    description: Add defines headers to add to responses.
                    type: object
                  remove:
                    description: Remove defines headers to remove from responses.
                    items:
                      type: string
                    type: array
                  securityHeaders:
                    default: true
                    description: SecurityHeaders adds common security headers (X-Frame-Options,
                      X-Content-Type-Options, etc.).
                    type: boolean
                type: object
              listen:
                description: Listen defines the listen directive configuration.
                properties:
                  httpsPort:
                    default: 443
                    description: HTTPSPort is the port to listen on for HTTPS traffic
                      (when TLS is enabled).
                    format: int32
                    maximum: 65535
                    minimum: 1
                    type: integer
                  port:
                    default: 80
                    description: Port is the port to listen on for HTTP traffic.
                    format: int32
                    maximum: 65535
                    minimum: 1
                    type: integer
                  proxyProtocol:
                    default: false
                    description: ProxyProtocol enables PROXY protocol support on the
                      listen directive.
                    type: boolean
                type: object
              locations:
                description: Locations defines the location blocks within this server
                  block.
                items:
                  description: NginxLocationSpec defines a location block within a
                    server block.
                  properties:
                    customLocationSnippet:
                      description: CustomLocationSnippet allows injecting raw NGINX
                        directives into this location block.
                      type: string
                    headers:
                      description: Headers defines per-location custom headers.
                      properties:
                        add:
                          additionalProperties:
                            type: string
                          description: Add defines headers to add to responses.
                          type: object
                        remove:
                          description: Remove defines headers to remove from responses.
                          items:
                            type: string
                          type: array
                        securityHeaders:
                          default: true
                          description: SecurityHeaders adds common security headers
                            (X-Frame-Options, X-Content-Type-Options, etc.).
                          type: boolean
                      type: object
                    path:
                      description: Path is the location path (e.g., "/", "/api", "~
                        \.php$").
                      minLength: 1
                      type: string
                    proxyPass:
                      description: |-
                        ProxyPass sets a direct proxy_pass URL (alternative to UpstreamRef).
                        Mutually exclusive with UpstreamRef, StaticContent, and Return.
                      type: string
                    proxySettings:
                      description: |-
                        ProxySettings defines proxy_* directives for this location.
                        Only applies when UpstreamRef or ProxyPass is set.
                      properties:
                        bufferSize:
                          default: 4k
                          description: BufferSize sets the proxy_buffer_size directive.
                          type: string
                        buffers:
                          default: 8 4k
                          description: Buffers sets the proxy_buffers directive (number
                            and size).
                          type: string
                        connectTimeout:
                          default: 60s
                          description: ConnectTimeout is the timeout for establishing
                            a connection to the upstream.
                          type: string
                        nextUpstream:
                          default: error timeout
                          description: NextUpstream defines conditions under which
                            the request is passed to the next upstream server.
                          type: string
                        nextUpstreamTries:
                          default: 3
                          description: NextUpstreamTries limits the number of possible
                            tries for passing a request to the next server.
                          format: int32
                          type: integer
                        readTimeout:
                          default: 60s
                          description: ReadTimeout is the timeout for reading a response
                            from the upstream.
                          type: string
                        sendTimeout:
                          default: 60s
                          description: SendTimeout is the timeout for transmitting
                            a request to the upstream.
                          type: string
                        setHeaders:
                          additionalProperties:
                            type: string
                          description: SetHeaders defines headers to pass to the upstream.
                          type: object
                        webSocket:
                          default: false
                          description: WebSocket enables WebSocket proxying (adds
                            Upgrade and Connection headers).
                          type: boolean
                      type: object
                    rateLimit:
                      description: RateLimit defines per-location rate limiting (overrides
                        server-level).
                      properties:
                        burst:
                          default: 20
                          description: Burst allows bursting above the rate limit
                            up to this many requests.
                          format: int32
                          type: integer
                        enabled:
                          description: Enabled enables rate limiting.
                          type: boolean
                        key:
                          default: $binary_remote_addr
                          description: Key defines what the rate limit is keyed on.
                          type: string
                        noDelay:
                          default: true
                          description: NoDelay processes burst requests without delay.
                          type: boolean
                        rate:
                          description: Rate defines the request rate limit (e.g.,
                            "10r/s", "100r/m").
                          pattern: ^\d+r/[sm]$
                          type: string
                        zone:
                          default: 10m
                          description: Zone defines the shared memory zone name and
                            size (e.g., "10m").
                          type: string
                      required:
                      - enabled
                      - rate
                      type: object
                    return:
                      description: |-
                        Return sends a fixed response (e.g., redirect, error page).
                        Mutually exclusive with UpstreamRef, ProxyPass, and StaticContent.
                      properties:
                        body:
                          description: Body is the response body or redirect URL.
                          type: string
                        code:
                          description: Code is the HTTP status code to return.
                          format: int32
                          maximum: 599
                          minimum: 100
                          type: integer
                      required:
                      - code
                      type: object
                    staticContent:
                      description: |-
                        StaticContent serves static files from the specified root directory.
                        Mutually exclusive with UpstreamRef, ProxyPass, and Return.
                      properties:
                        autoindex:
                          default: false
                          description: Autoindex enables directory listing.
                          type: boolean
                        index:
                          default:
                          - index.html
                          description: Index defines index file names.
                          items:
                            type: string
                          type: array
                        root:
                          description: Root is the root directory for serving static
                            files.
                          type: string
                        tryFiles:
                          description: TryFiles defines the try_files directive.
                          type: string
                      required:
                      - root
                      type: object
                    upstreamRef:
                      description: |-
                        UpstreamRef references an NginxUpstream resource by name for proxy_pass.
                        Mutually exclusive with StaticContent and Return.
                      type: string
                  required:
                  - path
                  type: object
                minItems: 1
                type: array
              priority:
                default: 100
                description: |-
                  Priority determines the order of server blocks in the NGINX configuration.
                  Lower values are processed first. Default is 100.
                format: int32
                maximum: 9999
                minimum: 0
                type: integer
              rateLimit:
                description: RateLimit defines rate limiting settings for this virtual
                  host.
                properties:
                  burst:
                    default: 20
                    description: Burst allows bursting above the rate limit up to
                      this many requests.
                    format: int32
                    type: integer
                  enabled:
                    description: Enabled enables rate limiting.
                    type: boolean
                  key:
                    default: $binary_remote_addr
                    description: Key defines what the rate limit is keyed on.
                    type: string
                  noDelay:
                    default: true
                    description: NoDelay processes burst requests without delay.
                    type: boolean
                  rate:
                    description: Rate defines the request rate limit (e.g., "10r/s",
                      "100r/m").
                    pattern: ^\d+r/[sm]$
                    type: string
                  zone:
                    default: 10m
                    description: Zone defines the shared memory zone name and size
                      (e.g., "10m").
                    type: string
                required:
                - enabled
                - rate
                type: object
              serverName:
                description: |-
                  ServerName defines the server_name directive (e.g., "example.com", "*.example.com").
                  Multiple hostnames can be specified as a space-separated string.
                minLength: 1
                type: string
              serverRef:
                description: |-
                  ServerRef is the name of the NginxServer resource this route belongs to.
                  The NginxServer must exist in the same namespace.
                minLength: 1
                type: string
              tls:
                description: TLS defines per-route TLS settings. Overrides the NginxServer
                  global TLS if set.
                properties:
                  enabled:
                    description: Enabled enables TLS for this route.
                    type: boolean
                  redirectHTTP:
                    default: true
                    description: RedirectHTTP automatically redirects HTTP to HTTPS
                      when true.
                    type: boolean
                  secretName:
                    description: SecretName references a Kubernetes TLS Secret for
                      this route.
                    type: string
                required:
                - enabled
                type: object
            required:
            - locations
            - serverName
            - serverRef
            type: object
          status:
            description: NginxRouteStatus defines the observed state of NginxRoute.
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the NginxRoute's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              configHash:
                description: ConfigHash is the SHA-256 hash of the generated config
                  for this route.
                type: string
              lastAppliedTime:
                description: LastAppliedTime is the timestamp when the config was
                  last applied.
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
