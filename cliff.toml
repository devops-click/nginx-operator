# ============================================================================
# git-cliff configuration for automated changelog generation
# ============================================================================
# Uses conventional commits to categorize changes.
# Run with: git-cliff --config cliff.toml -o CHANGELOG.md
# ============================================================================

[changelog]
header = """
# Changelog

All notable changes to the NGINX Operator project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""
body = """
{%- macro remote_url() -%}
  https://github.com/devops-click/nginx-operator
{%- endmacro -%}

{% if version -%}
  ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
  ## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits
| filter(attribute="scope")
| sort(attribute="scope") %}
  - **{{ commit.scope }}**: {{ commit.message }}
    {%- if commit.breaking %} ⚠️ **BREAKING**{% endif %}
    {%- if commit.body %}\n{{ commit.body | indent(prefix="    ") }}{% endif %}
{%- endfor -%}
{% for commit in commits %}
{%- if not commit.scope %}
  - {{ commit.message }}
    {%- if commit.breaking %} ⚠️ **BREAKING**{% endif %}
{%- endif -%}
{%- endfor -%}
{% endfor %}
"""
footer = """
---
*Generated by [git-cliff](https://git-cliff.org)*
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_preprocessors = [
  { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "([#${2}](https://github.com/devops-click/nginx-operator/issues/${2}))" },
]
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->🚀 Features" },
  { message = "^fix", group = "<!-- 1 -->🐛 Bug Fixes" },
  { message = "^perf", group = "<!-- 2 -->⚡ Performance" },
  { message = "^refactor", group = "<!-- 3 -->🔨 Refactoring" },
  { message = "^doc", group = "<!-- 4 -->📚 Documentation" },
  { message = "^style", group = "<!-- 5 -->🎨 Styling" },
  { message = "^test", group = "<!-- 6 -->🧪 Testing" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore\\(deps\\)", group = "<!-- 7 -->📦 Dependencies" },
  { message = "^chore|^ci", group = "<!-- 8 -->⚙️ Miscellaneous" },
  { body = ".*security", group = "<!-- 9 -->🔒 Security" },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "newest"
