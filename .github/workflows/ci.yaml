name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61.0
          args: --timeout=5m

      - name: Lint Helm chart
        run: |
          helm lint charts/nginx-operator

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Run unit tests
        run: |
          mkdir -p coverage
          go test ./... \
            -coverprofile=coverage/coverage.out \
            -covermode=atomic \
            -race \
            -count=1 \
            -timeout=300s

      - name: Generate coverage report
        run: go tool cover -func=coverage/coverage.out | tail -1

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage/coverage.out
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build operator binary
        run: |
          CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/operator ./cmd/operator/

      - name: Build reloader binary
        run: |
          CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/reloader ./cmd/reloader/

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ghcr.io/${{ github.repository }}:ci

      - name: Build Reloader Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.reloader
          push: false
          tags: ghcr.io/${{ github.repository }}-reloader:ci

  helm-test:
    name: Helm Template Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Template Helm chart
        run: |
          helm template test-release charts/nginx-operator \
            --namespace test-ns \
            --set replicaCount=1 \
            --set operator.debug=true \
            > /dev/null
          echo "Helm template rendering successful"

      - name: Template with all features enabled
        run: |
          helm template full-release charts/nginx-operator \
            --namespace prod-ns \
            --set replicaCount=3 \
            --set metrics.serviceMonitor.enabled=true \
            --set podDisruptionBudget.enabled=true \
            > /dev/null
          echo "Full feature template rendering successful"
